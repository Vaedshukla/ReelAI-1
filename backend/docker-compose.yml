# Local development with Docker
# Usage: docker compose up --build

services:
  api:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=${PORT:-8000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CLEANUP_AFTER_PROCESSING=true
    volumes:
      - ./downloads:/app/downloads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
